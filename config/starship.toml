# ─── Git ─────────────────────────────────────────────────────────────────────
[git_branch]
format = "on [$symbol$branch]($style) "
style = "bold #5b21b6"

[git_status]
conflicted = "⚠"
ahead = "↑"
behind = "↓"
diverged = "↕"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✗"

[git_metrics]
format = "([+$added](#9ece6a))([-$deleted](#f7768e))"
disabled = false

# ─── Runtimes ────────────────────────────────────────────────────────────────
[nodejs]
format = "via [⬢ $version](#7aa2f7) "
disabled = false

[python]
format = "via [🐍 $version](#7dcfff) "
disabled = false

[golang]
format = "via [🐹 $version](#9ece6a) "
disabled = false

[rust]
format = "via [🦀 $version](#f7768e) "
disabled = false

[lua]
format = "via [🌙 $version](#bb9af7) "
disabled = false

# ─── Command Duration ────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = "took [$duration](#7c3aed) "
show_milliseconds = true
disabled = false

# ─── Directory ───────────────────────────────────────────────────────────────
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path](#c0caf5)[$read_only]($read_only_style) "

# ─── Character ───────────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](#7c3aed)"
error_symbol = "[❯](#f7768e)"
vimcmd_symbol = "[❮](#7c3aed)"

# ─── Status ──────────────────────────────────────────────────────────────────
[status]
disabled = false
format = "[$symbol$status_common_name](#f7768e) "
symbol = "●"
style = "bold #f7768e"
pipestatus = true
pipestatus_format = "\\[$pipestatus\\] => [$symbol$status_common_name](#f7768e)"
pipestatus_separator = "|"

# ─── Time ────────────────────────────────────────────────────────────────────
[time]
disabled = false
format = "at [$time](#565f89) "
time_format = "%H:%M"
