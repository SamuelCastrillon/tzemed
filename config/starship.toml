# Tzemed — Starship Prompt Configuration
# Unified Tzemed palette: Tailwind violet-800 (#5b21b6) + stone-950 (#0c0c0c)
# Palette ref: config/theme/tzemed-palette.json

# ─── General ─────────────────────────────────────────────────────────────────
