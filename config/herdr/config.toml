# Tzemed — Herdr Configuration
# Editor and terminal defaults

[terminal]
default_shell = "pwsh"

[keys]
prefix = "ctrl+b"
reload_config = ["ctrl", "shift", "r"]
focus_pane_next = "prefix+tab"
focus_pane_prev = "prefix+shift+tab"
close_pane = "prefix+x"
toggle_fullscreen = "prefix+z"

[theme]
name = "tokyo-night"

[theme.custom]
accent = "#7aa2f7"

[ui]
sidebar_width = 32
pane_borders = true
pane_gaps = true
