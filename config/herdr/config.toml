# Tzemed — Herdr Configuration
# Editor and terminal defaults
# Palette: tzemed-palette.json → accent = #5b21b6 (violet-800)

[terminal]
default_shell = "pwsh"

[keys]
prefix = "ctrl+b"
focus_pane_next = "prefix+tab"
focus_pane_prev = "prefix+shift+tab"
close_pane = "prefix+x"
toggle_fullscreen = "prefix+z"

# Custom command bindings — type "shell" runs detached in background
[[keys.command]]
key = "ctrl+shift+r"
type = "shell"
command = "herdr server reload-config"
description = "reload herdr config"

[theme]
name = "tokyo-night"

[theme.custom]
accent = "#5b21b6"

[ui]
sidebar_width = 32
pane_borders = true
pane_gaps = true
